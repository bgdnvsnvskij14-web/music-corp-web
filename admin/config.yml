backend:
  name: git-gateway
  branch: main

media_folder: "/"
public_folder: "/"

collections:
  - name: "database"
    label: "База даних сайту"
    files:
      - label: "Керування контентом"
        name: "links"
        file: "data.json"
        fields:
          - label: "🎵 Музика KohaN"
            name: "kohan"
            widget: "list"
            fields:
              - {label: "Назва треку", name: "title", widget: "string"}
              - {label: "Посилання", name: "link", widget: "string"}
              - {label: "Обкладинка", name: "image", widget: "image", required: false}

          - label: "🎤 Музика Vyshnevsky"
            name: "vyshnevsky"
            widget: "list"
            fields:
              - {label: "Назва треку", name: "title", widget: "string"}
              - {label: "Посилання", name: "link", widget: "string"}
              - {label: "Обкладинка", name: "image", widget: "image", required: false}

          - label: "💥 Останній бум (Відео) - Посилання"
            name: "boom_video"
            widget: "string"
            required: false

          - label: "🎬 Кліпи (Плейлист) - Посилання"
            name: "clips_playlist"
            widget: "string"
            required: false

          - label: "📱 Наші спільноти (Лейбл)"
            name: "socials_label"
            widget: "list"
            fields:
              - {label: "Назва", name: "title", widget: "string"}
              - {label: "Посилання", name: "link", widget: "string"}

          - label: "👤 Соцмережі KoHaN"
            name: "socials_kohan"
            widget: "list"
            fields:
              - {label: "Назва", name: "title", widget: "string"}
              - {label: "Посилання", name: "link", widget: "string"}

          - label: "👤 Соцмережі Bohdan Vyshnevskyi"
            name: "socials_bohdan"
            widget: "list"
            fields:
              - {label: "Назва", name: "title", widget: "string"}
              - {label: "Посилання", name: "link", widget: "string"}

          - label: "👤 Соцмережі Ivan Vyshnevskyi"
            name: "socials_ivan"
            widget: "list"
            fields:
              - {label: "Назва", name: "title", widget: "string"}
              - {label: "Посилання", name: "link", widget: "string"}
