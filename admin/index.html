<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Панель керування | Music Corporation</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <style>
        /* Базові налаштування фону */
        body {
            background: #0f141a !important; /* Глибокий темний колір для стабільності */
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif !important;
        }

        /* Декоративний фон, який не заважає контенту */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('../Шапка канала 7.png') no-repeat center top !important;
            background-size: cover !important;
            opacity: 0.2; /* Робимо фон ледь помітним фокусом */
            z-index: -1;
        }

        /* Стилізація головної панелі CMS */
        #nc-root {
            background: transparent !important;
        }

        /* Верхня навігація */
        header {
            background: rgba(15, 20, 26, 0.95) !important;
            border-bottom: 2px solid #00f2ea !important; /* Твій фірмовий блакитний */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5) !important;
        }

        /* Сайдбар (бічна панель) */
        aside {
            background: rgba(20, 26, 33, 0.9) !important;
            border-right: 1px solid rgba(0, 242, 234, 0.1) !important;
        }

        /* Основна робоча область - робимо її чіткою та зручною */
        main {
            background: #1a2129 !important; /* Суцільний колір для тексту */
            border-radius: 12px !important;
            margin: 20px !important;
            padding: 10px !important;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6) !important;
        }

        /* Кнопки */
        button {
            border-radius: 8px !important;
            font-weight: 600 !important;
            transition: 0.3s !important;
        }

        /* Блакитні акценти (кнопки збереження, посилання) */
        .nc-app-container button[class*="StyledButton"], 
        .nc-collectionPage-sidebarLink-active {
            background-color: #00f2ea !important;
            color: #000000 !important;
        }

        /* Рожеві акценти для другорядних елементів */
        button[class*="StyledIcon"] {
            color: #ff0050 !important;
        }

        /* Поля вводу */
        input, select, textarea {
            background: #252d37 !important;
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 6px !important;
        }

        input:focus {
            border-color: #00f2ea !important;
        }

        /* Колір тексту */
        span, h1, h2, h3, label {
            color: #ffffff !important;
        }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
